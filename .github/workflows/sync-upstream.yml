name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/VIKINGYFY/immortalwrt.git

      - name: Fetch all branches from upstream
        run: |
          git fetch upstream

      - name: Sync and push all branches (safe preserve local commits)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          for branch in $(git branch -r | grep '^upstream/' | grep -v 'HEAD' | sed 's|upstream/||'); do
            if git show-ref --verify --quiet refs/heads/"$branch"; then
              git checkout "$branch"
              git fetch upstream "$branch"
              # Rebase local commits on top of upstream branch. If conflict occurs, stop for manual resolution.
              git rebase upstream/"$branch"
            else
              git checkout -B "$branch" "upstream/$branch"
            fi
            git push --force-with-lease origin "$branch"
          done